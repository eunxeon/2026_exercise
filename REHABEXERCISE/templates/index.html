<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트미러 재활운동 피드백 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="mirror-screen">
        <header class="mirror-header">
            <p class="eyebrow">SMART MIRROR REHAB</p>
            <h1 id="exercise-title">어깨 관절 가동 범위 운동</h1>
            <div class="clock">
                <span id="current-date">0000.00.00</span>
                <strong id="current-time">00:00</strong>
            </div>
        </header>

        <section class="camera-panel" aria-label="카메라 화면">
            <div class="camera-placeholder">
                <div class="camera-badge" id="exercise-state">READY</div>
                <div class="pose-outline" aria-hidden="true">
                    <span class="head"></span>
                    <span class="body"></span>
                    <span class="arm left-arm"></span>
                    <span class="arm right-arm"></span>
                    <span class="leg left-leg"></span>
                    <span class="leg right-leg"></span>
                </div>
                <p id="camera-message">카메라 또는 라즈베리파이 영상 입력을 연결할 영역입니다.</p>
            </div>
        </section>

        <section class="feedback-panel" aria-label="운동 피드백">
            <article class="metric-card">
                <span>정확도</span>
                <strong id="accuracy-value">0%</strong>
                <div class="progress-track">
                    <div class="progress-fill" id="accuracy-progress"></div>
                </div>
            </article>
            <article class="metric-card">
                <span>관절 각도</span>
                <strong id="angle-value">0도</strong>
                <p id="target-angle">목표 각도 80도</p>
            </article>
            <article class="metric-card">
                <span>현재 단계</span>
                <strong id="stage-value">준비</strong>
                <p id="rep-counter">0 / 15회</p>
            </article>
            <article class="feedback-card">
                <span>피드백</span>
                <strong id="feedback-text">운동 시작 버튼을 누르면 예시 피드백이 표시됩니다.</strong>
            </article>
        </section>

        <nav class="bottom-actions" aria-label="운동 조작">
            <button type="button" id="start-button">운동 시작</button>
            <button type="button" id="reset-button">초기화</button>
        </nav>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
